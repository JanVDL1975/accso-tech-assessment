name: Maven Release

on:
  push:
    branches: [ "dev" ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Configure authentication
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/JanVDL1975/accso-tech-assessment.git

      - name: Build & Test
        run: mvn clean test -B

      - name: Maven Release
        run: mvn -B release:prepare release:perform
