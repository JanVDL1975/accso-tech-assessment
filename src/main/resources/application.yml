spring:
  application:
    name: shipment-integrity-service

  datasource:
    url: "jdbc:sqlite:shipment.db"
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

server:
  port: 8080

retention:
  raw-event-days: 30
  audit-log-days: 365
  batch-size: 1000
  raw-event-cron: "0 0 2 * * *"
  audit-log-cron: "0 0 4 * * *"
