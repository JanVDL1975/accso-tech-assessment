spring:
  application:
    name: shipment-integrity-service

  datasource:
    url: "jdbc:sqlite:shipment.db"
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

server:
  port: 8080
